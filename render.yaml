services:
  - type: web
    name: inboxfixer
    runtime: node
    plan: free
    buildCommand: npm run build
    startCommand: npm run start
    envVars:
      - key: NODE_VERSION
        value: 20.x
      - key: NEXT_PUBLIC_APP_URL
        value: https://inboxfixer.onrender.com
      - key: NEXT_PUBLIC_SUPABASE_URL
        value: https://your_supabase_project.supabase.co
      - key: NEXT_PUBLIC_SUPABASE_ANON_KEY
        value: your_supabase_anon_key
