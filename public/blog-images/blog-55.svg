<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450" width="100%" height="100%">
  <defs>
    <linearGradient id="grad-55" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0a0f1e" />
      <stop offset="100%" stop-color="#0f1729" />
    </linearGradient>
    <pattern id="grid-55" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#00ff88" stroke-width="0.5" opacity="0.07" />
    </pattern>
  </defs>
  
  <!-- Background -->
  <rect width="800" height="450" fill="url(#grad-55)" />
  
  <!-- Tech Grid Overlay -->
  <rect width="800" height="450" fill="url(#grid-55)" />
  
  <!-- Neon decorative orbs -->
  <circle cx="150" cy="120" r="100" fill="#00ff88" opacity="0.04" filter="blur(40px)" />
  <circle cx="650" cy="320" r="120" fill="#00ff88" opacity="0.03" filter="blur(50px)" />

  <!-- Abstract digital diagnostic circle -->
  <circle cx="400" cy="225" r="120" fill="none" stroke="#00ff88" stroke-width="1.5" stroke-dasharray="10, 8" opacity="0.15" />
  <circle cx="400" cy="225" r="140" fill="none" stroke="#00ff88" stroke-width="0.5" opacity="0.08" />

  <!-- Stylized corner diagnostic brackets -->
  <path d="M 40 60 L 40 40 L 60 40" fill="none" stroke="#00ff88" stroke-width="1.5" opacity="0.3" />
  <path d="M 760 60 L 760 40 L 740 40" fill="none" stroke="#00ff88" stroke-width="1.5" opacity="0.3" />
  <path d="M 40 390 L 40 410 L 60 410" fill="none" stroke="#00ff88" stroke-width="1.5" opacity="0.3" />
  <path d="M 760 390 L 760 410 L 740 410" fill="none" stroke="#00ff88" stroke-width="1.5" opacity="0.3" />

  <!-- Center Icon Wrapper -->
  <g transform="translate(372, 197) scale(2.4)">
    <rect x="2" y="2" width="20" height="8" rx="2" fill="none" stroke="#00ff88" stroke-width="2"/><rect x="2" y="14" width="20" height="8" rx="2" fill="none" stroke="#00ff88" stroke-width="2"/><line x1="6" y1="6" x2="6" y2="6.01" stroke="#00ff88" stroke-width="3" stroke-linecap="round"/><line x1="6" y1="18" x2="6" y2="18.01" stroke="#00ff88" stroke-width="3" stroke-linecap="round"/>
  </g>

  <!-- Typography metadata overlay -->
  <text x="400" y="380" font-family="'Syne', 'Inter', sans-serif" font-size="16" font-weight="bold" fill="#ffffff" opacity="0.8" text-anchor="middle" letter-spacing="4">
    INBOXFIXER DIAGNOSTICS
  </text>
  
  <text x="400" y="405" font-family="'IBM Plex Mono', monospace" font-size="11" fill="#00ff88" opacity="0.6" text-anchor="middle" letter-spacing="2">
